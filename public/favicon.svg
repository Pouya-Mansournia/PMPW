<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#131b24"/>
      <stop offset="100%" stop-color="#080c11"/>
    </linearGradient>
  </defs>

  <!-- Rounded square background -->
  <rect width="100" height="100" rx="22" fill="url(#bg)"/>

  <!-- Teal accent bar — left edge -->
  <rect x="0" y="28" width="6" height="44" rx="3" fill="#7be0b5"/>

  <!-- Teal bottom underline -->
  <rect x="22" y="80" width="56" height="5" rx="2.5" fill="#7be0b5" opacity="0.7"/>

  <!-- White "P" -->
  <text
    x="54"
    y="76"
    font-family="Inter,ui-sans-serif,system-ui,-apple-system,sans-serif"
    font-size="72"
    font-weight="900"
    fill="#ffffff"
    text-anchor="middle"
    letter-spacing="-3"
  >P</text>
</svg>
